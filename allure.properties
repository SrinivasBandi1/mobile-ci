# \u2500\u2500\u2500 Allure Configuration \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
# Place this file at: src/test/resources/allure.properties
#
# allure.results.directory must match the systemPropertyVariable set in pom.xml
# surefire configuration and the resultsDirectory in allure-maven plugin config.
# All three must point to the same path or reports will be generated empty.

allure.results.directory=target/allure-results

# Link patterns \u2014 if you use Jira or TestRail, set these so test IDs in
# @TmsLink and @Issue annotations become clickable links in the Allure report.
# allure.link.tms.pattern=https://your-jira.atlassian.net/browse/{}
# allure.link.issue.pattern=https://your-jira.atlassian.net/browse/{}
